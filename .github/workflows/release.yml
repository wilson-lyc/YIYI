name: Release macOS App

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build and publish DMG
    runs-on: macos-15
    env:
      APP_VERSION: 0.1.${{ github.run_number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build app and DMG
        env:
          APP_VERSION: ${{ env.APP_VERSION }}
          BUILD_NUMBER: ${{ github.run_number }}
          BUNDLE_ID: com.local.yiyi
          CODE_SIGN_IDENTITY: "-"
        run: |
          chmod +x Scripts/package_app.sh
          Scripts/package_app.sh

      - name: Publish release
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ env.APP_VERSION }}
          name: YIYI v${{ env.APP_VERSION }}
          body: |
            Automatically built from `${{ github.sha }}` on `main`.

            This build uses ad-hoc macOS signing (`codesign --sign -`) and is not notarized because no Apple Developer account is configured.
          artifacts: dist/YIYI-${{ env.APP_VERSION }}.dmg
          makeLatest: true
          token: ${{ secrets.GITHUB_TOKEN }}
